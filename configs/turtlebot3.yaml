# TurtleBot3 Burger physical parameters.
# Reference: ROBOTIS e-Manual.

robot:
  name: "turtlebot3_burger"
  max_linear_velocity: 0.22       # m/s
  max_angular_velocity: 2.84      # rad/s
  wheel_radius: 0.033             # m
  wheel_separation: 0.160         # m
  mass: 1.0                       # kg (with battery, approximate)
  moment_of_inertia: 8.7e-3       # kg·m^2 (approximate)
  linear_time_constant: 0.20      # s
  angular_time_constant: 0.10     # s
  footprint_radius: 0.105         # m
